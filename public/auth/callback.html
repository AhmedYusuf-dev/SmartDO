<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authenticating...</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f9fafb; color: #374151; }
    .loader { border: 4px solid #f3f4f6; border-top: 4px solid #4f46e5; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 16px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .container { text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <div class="loader"></div>
    <div id="message">Completing authentication...</div>
  </div>
  <script>
    async function handleAuth() {
      try {
        // Google returns the token in the URL hash for implicit flow
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const accessToken = params.get('access_token');
        const error = params.get('error');

        if (error) {
          throw new Error(error);
        }

        if (!accessToken) {
          throw new Error('No access token found in URL.');
        }

        // Fetch user profile from Google
        const response = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
          headers: { Authorization: `Bearer ${accessToken}` }
        });

        if (!response.ok) {
          throw new Error('Failed to fetch user profile.');
        }

        const userData = await response.json();

        const user = {
          id: userData.id,
          name: userData.name,
          email: userData.email,
          avatarUrl: userData.picture,
          accessToken: accessToken
        };

        // Send the user data back to the main window
        if (window.opener) {
          window.opener.postMessage({ type: 'OAUTH_AUTH_SUCCESS', user: user }, '*');
          document.getElementById('message').innerText = 'Authentication successful! You can close this window.';
          setTimeout(() => window.close(), 1000);
        } else {
          // If opened directly (not a popup), redirect to home
          localStorage.setItem('smartdo_user', JSON.stringify(user));
          window.location.href = '/';
        }
      } catch (err) {
        console.error('Auth error:', err);
        document.getElementById('message').innerText = `Authentication failed: ${err.message}`;
        document.querySelector('.loader').style.display = 'none';
      }
    }

    handleAuth();
  </script>
</body>
</html>
